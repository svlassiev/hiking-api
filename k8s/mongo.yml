apiVersion: v1
kind: Service
metadata:
  name: mongo-cdc
  labels:
    name: mongo-cdc
spec:
  ports:
    - port: 27017
      targetPort: 27017
  clusterIP: None
  selector:
    app: mongo-cdc
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo-cdc
spec:
  serviceName: "mongo-cdc"
  replicas: 1
  selector:
    matchLabels:
      app: mongo-cdc
  template:
    metadata:
      labels:
        app: mongo-cdc
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: mongo-cdc
          image: mongo:4.2
          imagePullPolicy: Always
          ports:
            - containerPort: 27017
          resources:
            requests:
              cpu: 10m
              memory: 64M
            limits:
              cpu: 100m
              memory: 512M
          volumeMounts:
            - name: mongo-cdc-persistent-storage
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: mongo-cdc-persistent-storage
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 10Gi
